<div class="wrapper">
    <samp class="icon-close"> 
        <svg lucideX></svg>
    </samp>
    <div class="form-box register">
        <h2>Registration</h2>
        <form action="#">
            <div class="input-box">
                <span class="icon">
                    <svg lucideUser></svg>
                </span>
                <input type="text" required>
                <label>Username</label>
            </div>
            <div class="input-box">
                <span class="icon">
                    <svg lucideMail></svg>
                </span>
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <span class="icon">
                    <svg lucideEyeOff></svg>
                </span>
                <input type="password" required>
                <label>Password</label>
            </div>
            <div class="remember-forgot">
                <label for=""><input type="checkbox">I agree to the terms & conditions</label>
                
            </div>
            <button type="submit" class="btn">Register</button>
            <div class="login-register">
                <p>Already have an account? <a routerLink="/auth" class="login-link">Login</a></p>
            </div>
        </form>
    </div>
</div>
